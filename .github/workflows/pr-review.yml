name: Agentic Code Review

# Auto-review every pull request and post the findings as inline comments.
# GitHub supplies a scoped GITHUB_TOKEN for this run, so it works on private repos with
# no PAT setup. Note: PRs from forks get a read-only token, so posting only works on
# same-repo PRs (fork PRs will review but can't comment).
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read          # check out + read the changed files
  pull-requests: write    # post the inline review comments

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Review the PR and post comments
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub Actions
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}   # add this as a repo secret (else suggested tier is skipped)
        run: |
          python main.py "https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}" --post
